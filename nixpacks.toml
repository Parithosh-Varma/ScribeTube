[phases.setup]
nixPkgs = ["nodejs", "python3", "python3Packages.pip", "python3Packages.setuptools"]

[phases.install]
cmds = [
  "npm install",
  "python3 -m venv /app/.venv && /app/.venv/bin/pip install -r requirements.txt"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "/app/.venv/bin/gunicorn --bind 0.0.0.0:8080 server.server:app"

